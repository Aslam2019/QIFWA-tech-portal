<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Management</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: white; margin: 40px; }
        .dashboard-container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h2, h3 { color: #38bdf8; text-align: center; }
        label { display: block; margin-top: 15px; color: #cbd5e1; font-weight: 500; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #0f172a; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background-color: #22c55e; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 25px; transition: 0.3s; }
        button:hover { background-color: #16a34a; transform: translateY(-1px); }
        .logout-btn { background-color: #ef4444; margin-top: 15px; }
        .logout-btn:hover { background-color: #dc2626; }
        
        /* டெலீட் லிஸ்ட் ஸ்டைல் */
        .job-list-admin { margin-top: 30px; background: #0f172a; padding: 15px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .job-item-admin { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .job-item-admin:last-child { border-bottom: none; }
        .del-btn { background: #ef4444; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; display: inline-block; }
        .del-btn:hover { background: #b91c1c; transform: scale(1.05); }
        
        /* ⏸️ ஹோல்டு பட்டனுக்கான புதிய ஸ்டைல் ப்ரோ */
        .hold-btn { color: black; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; display: inline-block; margin-right: 5px; }
        .hold-btn:hover { transform: scale(1.05); }

        .badge { background: rgba(56, 189, 248, 0.2); color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Opportunity Management</h2>
        <form action="/add-product" method="post">
            <label>Opportunity Title (Role Name)</label>
            <input type="text" name="prod_name" placeholder="e.g. Python Developer" required>
            
            <label>Domain / Requirement Details</label>
            <textarea id="oppDetails" name="dom_name" placeholder="e.g. Duration: 3 Months | Remote&#10;Line 2 Requirements..." rows="4" style="width: 100%; box-sizing: border-box; background: #0f172a; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; margin-top: 5px; border-radius: 6px; font-family: inherit; resize: vertical; font-size: 15px;" required></textarea>
            
            <label>Opportunity Category</label>
            <select name="job_type">
                <option value="internship">Internship Program 🎓</option>
                <option value="job">Full-Time Corporate Job 🚀</option>
            </select>
            
            <button type="submit">Publish Opportunity</button>
        </form>

        <div class="job-list-admin">
            <h3>Current Active List (Click ❌ to Delete)</h3>
            <div id="adminProductsList">
                {% if db_products %}
                    {% for p in db_products %}
                    <div class="job-item-admin" id="job-card-{{ p[3] }}" data-title="{{ p[0] }}" data-details="{{ p[1] }}" data-category="{{ 'Internship Program' if p[2] == 'internship' else 'Full Time Job' }}">
                        <div>
                            <strong style="color: #e2e8f0; font-size: 16px;">{{ p[0] }}</strong>
                            <span class="badge">{{ p[2] }}</span>
                            <span id="hold-badge-{{ p[3] }}"></span>
                            <br>
                            <span style="font-size: 13px; color: #94a3b8; white-space: pre-line;">{{ p[1] }}</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <button type="button" onclick="toggleHold('{{ p[3] }}')" id="hold-btn-{{ p[3] }}" class="hold-btn" style="background-color: #ffc107; color: black; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 8px; display: flex; align-items: center; gap: 4px;">
                                <span>⏸️</span> Hold
                            </button>
                            <a href="/delete-product/{{ p[3] }}" class="del-btn" onclick="return confirm('Are you sure you want to delete this opportunity?')">Delete ❌</a>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <p style="color: #cbd5e1; text-align: center; font-size: 14px; margin: 15px 0;">No active custom opportunities found.</p>
                {% endif %}
            </div>
        </div>

        <a href="/logout"><button class="logout-btn">Secure Logout</button></a>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // அட்மின் பேஜ் லோடு ஆனதும் ஹோல்டு ஸ்டேட்டஸ்களை செக் பண்ணி அப்டேட் செய்யும் லோக்கல் ரன்னர்
        document.addEventListener("DOMContentLoaded", () => {
            const oppList = JSON.parse(localStorage.getItem('opportunities')) || [];
            oppList.forEach(opp => {
                const holdBtn = document.getElementById(`hold-btn-${opp.id}`);
                const holdBadge = document.getElementById(`hold-badge-${opp.id}`);
                const jobCard = document.getElementById(`job-card-${opp.id}`);
                
                if (opp.status === 'hold') {
                    if (holdBtn) { holdBtn.innerText = "▶️ Unhold"; holdBtn.style.backgroundColor = "#22c55e"; holdBtn.style.color = "white"; }
                    if (holdBadge) holdBadge.innerHTML = `<span class="badge" style="background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid #ef4444;">HOLD</span>`;
                }
            });
            
            // ஒருவேளை லோக்கல் ஸ்டோரேஜ் சுத்தமா காலியா இருந்தா, பைதான் குடுக்குற முதல் 6 ஜாப்களை மெமரிக்கு ஏத்துறோம்
            if (!localStorage.getItem('opportunities')) {
                const initialList = [];
                document.querySelectorAll('.job-item-admin').forEach(item => {
                    const id = item.id.replace('job-card-', '');
                    const title = item.querySelector('strong').innerText;
                    const catBadge = item.querySelector('.badge').innerText;
                    const category = catBadge.includes('INTERN') ? 'Internship Program' : 'Full Time Job';
                    const details = item.querySelector('span[style*="font-size: 13px"]').innerText;
                    
                    initialList.push({ id: id, title: title, category: category, details: details, status: 'active' });
                });
                if(initialList.length > 0) localStorage.setItem('opportunities', JSON.stringify(initialList));
            }
        });
    </script>
</body>
</html>
