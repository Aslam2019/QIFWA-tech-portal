<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Management</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: white; margin: 40px; }
        .dashboard-container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h2, h3 { color: #38bdf8; text-align: center; }
        label { display: block; margin-top: 15px; color: #cbd5e1; font-weight: 500; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #0f172a; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background-color: #22c55e; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 25px; transition: 0.3s; }
        button:hover { background-color: #16a34a; transform: translateY(-1px); }
        .logout-btn { background-color: #ef4444; margin-top: 15px; }
        .logout-btn:hover { background-color: #dc2626; }
        
        /* டெலீட் லிஸ்ட் ஸ்டைல் */
        .job-list-admin { margin-top: 30px; background: #0f172a; padding: 15px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .job-item-admin { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .job-item-admin:last-child { border-bottom: none; }
        .del-btn { background: #ef4444; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .del-btn:hover { background: #b91c1c; transform: scale(1.05); }
        .badge { background: rgba(56, 189, 248, 0.2); color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Opportunity Management</h2>
        <form action="/add-product" method="post">
            <label>Opportunity Title (Role Name)</label>
            <input type="text" name="prod_name" placeholder="e.g. Python Developer" required>
            
            <label>Domain / Requirement Details</label>
            <input type="text" name="dom_name" placeholder="e.g. Duration: 3 Months | Remote" required>
            
            <label>Opportunity Category</label>
            <select name="job_type">
                <option value="internship">Internship Program 🎓</option>
                <option value="job">Full-Time Corporate Job 🚀</option>
            </select>
            
            <button type="submit">Publish Opportunity</button>
        </form>

        <div class="job-list-admin">
            <h3>Current Active List (Click ❌ to Delete)</h3>
            <div id="adminProductsList">
                {% if db_products %}
                    {% for p in db_products %}
                    <div class="job-item-admin">
                        <div>
                            <strong style="color: #e2e8f0; font-size: 16px;">{{ p[0] }}</strong>
                            <span class="badge">{{ p[2] }}</span>
                            <br>
                            <span style="font-size: 13px; color: #94a3b8;">{{ p[1] }}</span>
                        </div>
                        <a href="/delete-product/{{ p[3] }}" class="del-btn" onclick="return confirm('Are you sure you want to delete this opportunity?')">Delete ❌</a>
                    </div>
                    {% endfor %}
                {% else %}
                    <p style="color: #cbd5e1; text-align: center; font-size: 14px; margin: 15px 0;">No active custom opportunities found.</p>
                {% endif %}
            </div>
        </div>

        <a href="/logout"><button class="logout-btn">Secure Logout</button></a>
    </div>
</body>
</html>
